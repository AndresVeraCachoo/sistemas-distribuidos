name: Analisis de SonarCloud Practica 2

on:
  push:
    branches:
      - main
  workflow_dispatch: # Botón manual

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Preparamos Java en la máquina de GitHub (Usabas la versión 21 en Maven)
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # Compilamos el frontend para que SonarCloud pueda leer los binarios
      - name: Compilar Frontend (Maven)
        working-directory: ./Practica-2/frontend
        run: chmod +x mvnw && ./mvnw clean compile

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: Practica-2
