name: Analisis de SonarCloud Practica 2

on:
  push:
    branches:
      - main
  workflow_dispatch: # Botón manual

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # BACKEND (PYTHON): Instalar y Testear
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Testear Backend y Generar Coverage
        working-directory: ./Practica-2/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pytest --cov=src --cov-report=xml

      # FRONTEND (JAVA): Preparar y Testear
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Testear Frontend (JaCoCo)
        working-directory: ./Practica-2/frontend
        run: |
          chmod +x mvnw
          ./mvnw clean test

      # Escanear todo junto
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: Practica-2
