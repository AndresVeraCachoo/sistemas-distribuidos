name: CI Ejecucion de Tests Practica 2

on:
  push:
    branches:
      - main
    paths:
      - "Practica-2/**"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Practica-2/**"

jobs:
  # Testear la API de Python
  test-python:
    name: Tests de Pokemon API (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias y ejecutar PyTest
        working-directory: ./Practica-2/pokemon-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pytest

  # Testear la Webapp de Java
  test-java:
    name: Tests de Webapp (Java)
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 21 y Maven Cache
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Ejecutar tests con Maven
        working-directory: ./Practica-2/webapp
        run: |
          chmod +x mvnw
          ./mvnw clean test
