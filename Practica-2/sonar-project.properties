# Claves que te ha dado SonarCloud
sonar.projectKey=AndresVeraCachoo_sistemas-distribuidos
sonar.organization=andresveracachoo

# Apuntamos a la nube
sonar.host.url=https://sonarcloud.io

# Como GitHub Actions ya usa projectBaseDir: Practica-2, estas rutas DEBEN ser relativas
sonar.sources=frontend/src/main, backend/src

# Añadimos las exclusiones relativas a Practica-2 para que no escanee compilados ni estilos
sonar.exclusions=frontend/target/**, backend/env/**, backend/__pycache__/**, **/*.css, **/*.js

# Marcamos que version de python uso para un analisis mas preciso:
sonar.python.version=3.13