<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>PokeApp | Creador de Equipos</title>
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico?v=2">
  <link rel="stylesheet" th:href="@{/css/global.css}" />
  <link rel="stylesheet" th:href="@{/css/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/components.css}" />
  
  <link rel="stylesheet" th:href="@{/css/equipo.css}" />
</head>
<body>
  <header class="navbar">
    <div class="logo">PokeApp</div>
    <nav class="nav-links">
      <a href="/">Inicio</a>
      <div class="profile-container" th:if="${usuario != null}">
        <div class="profile-trigger">
          <img th:src="${usuario.avatarUrl}" alt="Icono" class="profile-icon" />
        </div>
        <div class="dropdown-content">
          <a href="/perfil">Mi Perfil</a>
          <a href="/historial">Estad. Entrenador</a>
          <a href="/equipo">Team Builder</a>
          <form th:action="@{/logout}" method="post"><button type="submit">Cerrar Sesión</button></form>
        </div>
      </div>
    </nav>
  </header>

  <main class="container">
    <h1>Analista Competitivo (IA)</h1>
    
    <div class="card builder-container">
      <p class="text-muted text-center" style="margin-top: 0;">Añade 6 Pokémon a tu equipo para ser analizado.</p>
      
      <div class="search-box">
        <input type="text" id="pokemon-search" list="pokemon-list" placeholder="Buscar Pokémon..." autocomplete="off">
        <datalist id="pokemon-list"></datalist>
        <button type="button" id="btn-add" class="btn-search">Añadir</button>
      </div>

      <form id="team-form" th:action="@{/equipo/analizar}" method="post">
        <div id="hidden-inputs"></div>
        <div class="team-grid" id="team-slots">
          </div>
        <button type="submit" id="btn-analizar" class="btn-search btn-red w-100" style="margin-top: 25px;" disabled>ANALIZAR EQUIPO CON GEMINI</button>
      </form>
    </div>

    <section th:if="${analisis != null}" class="results" style="margin-top: 30px;">
      
      <div th:if="${analisis.containsKey('error')}" class="card error-card">
        <h3 th:text="${analisis.get('error')}">Error en la consulta</h3>
      </div>

      <div th:if="${!analisis.containsKey('error')}" class="card">
        <h2>Veredicto Final</h2>
        
        <div th:with="pts=${analisis.get('puntuacion')}" 
             th:classappend="${pts >= 80 ? 'score-high' : (pts >= 50 ? 'score-medium' : 'score-low')}" 
             class="score-circle">
          <span th:text="${pts}">0</span>
        </div>

        <div class="analysis-section">
          <h3 style="color: var(--pkmn-blue);">Sinergia y Tipos</h3>
          <p th:text="${analisis.get('sinergia')}"></p>
        </div>

        <div class="analysis-section">
          <h3 style="color: var(--pkmn-blue);">Balance</h3>
          <p th:text="${analisis.get('balance')}"></p>
        </div>

        <div class="analysis-section">
          <h3 style="color: var(--pkmn-blue);">Estrategia Recomendada</h3>
          <p th:text="${analisis.get('estrategia')}"></p>
        </div>

        <div class="analysis-section" style="border-left: 4px solid var(--pkmn-red);">
          <h3 style="color: var(--pkmn-red);">Sugerencia de Mejora</h3>
          <p th:text="${analisis.get('cambio_sugerido')}"></p>
        </div>
      </div>
    </section>
  </main>

  <script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', function() {
        const MAX_TEAM = 6;
        let miEquipo = []; 
        let todosLosPokemon = [];
        
        const searchInput = document.getElementById('pokemon-search');
        const dataList = document.getElementById('pokemon-list');
        const btnAdd = document.getElementById('btn-add');
        const teamSlots = document.getElementById('team-slots');
        const hiddenContainer = document.getElementById('hidden-inputs');
        const btnAnalizar = document.getElementById('btn-analizar');

        // Recuperar el equipo si hubo un error y la página se recargó
        const equipoAnterior = /*[[${equipoEnviado}]]*/ null;

        // Cargar lista para autocompletado
        fetch('https://pokeapi.co/api/v2/pokemon?limit=1302')
            .then(response => response.json())
            .then(data => { todosLosPokemon = data.results.map(p => p.name); })
            .catch(err => console.error('Error cargando Pokédex:', err));

        // --- NUEVO: Función para restaurar las cartas si falla la IA ---
        async function restaurarEquipo() {
            if (equipoAnterior && equipoAnterior.length > 0) {
                searchInput.disabled = true;
                btnAdd.disabled = true;
                
                for (let nombre of equipoAnterior) {
                    if (nombre) {
                        try {
                            const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${nombre.toLowerCase()}`);
                            if (response.ok) {
                                const data = await response.json();
                                miEquipo.push({
                                    name: data.name,
                                    sprite: data.sprites.front_default || 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png',
                                    types: data.types.map(t => t.type.name).join(', ')
                                });
                            }
                        } catch (error) {
                            console.error('Error restaurando Pokémon:', nombre);
                        }
                    }
                }
                renderizarEquipo();
                searchInput.disabled = false;
                btnAdd.disabled = false;
            }
        }

        // Llamamos a restaurar el equipo al cargar la página
        restaurarEquipo();

        searchInput.addEventListener('input', function(e) {
            const texto = e.target.value.toLowerCase();
            dataList.innerHTML = ''; 
            if (texto.length > 0) {
                const sugerencias = todosLosPokemon.filter(nombre => nombre.startsWith(texto)).slice(0, 8);
                sugerencias.forEach(nombre => {
                    const option = document.createElement('option');
                    option.value = nombre;
                    dataList.appendChild(option);
                });
            }
        });

        searchInput.addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                e.preventDefault();
                agregarPokemon();
            }
        });

        btnAdd.addEventListener('click', agregarPokemon);

        async function agregarPokemon() {
            const nombre = searchInput.value.toLowerCase().trim();
            if (!nombre) return;

            if (miEquipo.length >= MAX_TEAM) {
                alert('El equipo ya está completo. Elimina un Pokémon haciendo clic en su botón [X] para añadir uno nuevo.');
                return;
            }

            searchInput.disabled = true;
            btnAdd.disabled = true;

            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${nombre}`);
                if (!response.ok) throw new Error('No encontrado');
                
                const data = await response.json();
                
                miEquipo.push({
                    name: data.name,
                    sprite: data.sprites.front_default || 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png',
                    types: data.types.map(t => t.type.name).join(', ')
                });

                searchInput.value = '';
                renderizarEquipo();

            } catch (error) {
                alert(`No se encontró ningún Pokémon llamado "${nombre}". Revisa la ortografía.`);
            } finally {
                searchInput.disabled = false;
                btnAdd.disabled = false;
                searchInput.focus();
            }
        }

        function renderizarEquipo() {
            teamSlots.innerHTML = '';
            hiddenContainer.innerHTML = '';

            for (let i = 0; i < MAX_TEAM; i++) {
                const slot = document.createElement('div');
                slot.className = 'team-slot';

                if (i < miEquipo.length) {
                    const poke = miEquipo[i];
                    slot.classList.add('slot-filled');
                    slot.innerHTML = `
                        <div class="remove-btn" title="Quitar del equipo">X</div>
                        <img src="${poke.sprite}" alt="${poke.name}">
                        <h3>${poke.name}</h3>
                        <p>${poke.types}</p>
                    `;
                    
                    slot.querySelector('.remove-btn').addEventListener('click', () => {
                        miEquipo.splice(i, 1);
                        renderizarEquipo();
                    });

                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'pokemon';
                    input.value = poke.name;
                    hiddenContainer.appendChild(input);
                } else {
                    slot.classList.add('slot-empty');
                    slot.innerHTML = 'Vacío';
                }
                teamSlots.appendChild(slot);
            }

            btnAnalizar.disabled = (miEquipo.length !== MAX_TEAM);
        }

        renderizarEquipo();
    });
    /*]]>*/
  </script>
</body>
</html>
