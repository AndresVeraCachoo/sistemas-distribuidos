# CONFIGURACIÓN EXCLUSIVA PARA TESTS (H2)

# Sobrescribimos el nombre de la app (opcional, pero buena práctica)
spring.application.name=frontend-test

# Usar H2 en memoria RAM en lugar de PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configurar Hibernate para que entienda H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Crear las tablas al empezar el test y borrarlas al terminar
spring.jpa.hibernate.ddl-auto=create-drop

# Mostrar el SQL por consola para ver qué hace en los tests
spring.jpa.show-sql=true