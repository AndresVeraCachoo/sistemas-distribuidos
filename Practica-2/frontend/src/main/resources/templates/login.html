<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PokeApp - Entrar</title>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/components.css}" />
</head>
<body>
    <div class="container auth-container">
        <div class="card">
            
            <div class="auth-header">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" 
                     alt="Pokeball" 
                     class="auth-icon">
                <h2 class="auth-title">SIGN IN</h2>
            </div>
            
            <!-- Mensajes dinámicos -->
            <!-- AQUÍ ESTÁ EL CAMBIO DE LA OFICIAL JENNY -->
            <div th:if="${param.error}" class="card alert alert-error">
                <span th:if="${session.SPRING_SECURITY_LAST_EXCEPTION != null}" 
                      th:text="${session.SPRING_SECURITY_LAST_EXCEPTION.message}">
                </span>
                <span th:unless="${session.SPRING_SECURITY_LAST_EXCEPTION != null}">
                    Credenciales incorrectas.
                </span>
            </div>
            
            <div th:if="${param.logout}" class="card alert alert-success">
                Sesión cerrada con éxito.
            </div>

            <div th:if="${param.registrado}" class="card alert alert-info">
                ¡Registro completado! Ahora puedes entrar.
            </div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">ID ENTRENADOR (Usuario):</label>
                    <input type="text" id="username" name="username" autocomplete="username" class="w-100" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">CÓDIGO SECRETO (Contraseña):</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" class="w-100" required>
                </div>
                
                <button type="submit" class="btn-search auth-btn">
                    ENTRAR AL SISTEMA
                </button>
            </form>
            
            <p class="auth-footer">
                ¿Eres nuevo? <a href="/registro" style="color: var(--pkmn-blue);">¡CREAR CUENTA!</a>
            </p>
            <p class="auth-hint">
                ¿Pruebas? Usa [ ash / pueblopaleta ]
            </p>
        </div>
    </div>
</body>
</html>
