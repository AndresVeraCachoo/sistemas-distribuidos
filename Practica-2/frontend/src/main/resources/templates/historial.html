<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>PokeApp - Estadísticas</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <style>
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid #3498db; }
    .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; color: #2c3e50; }
    .history-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-top: 20px; }
    .history-table th, .history-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    .history-table th { background-color: #f8f9fa; }
    .mini-sprite { width: 40px; height: 40px; vertical-align: middle; margin-right: 10px; }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="logo">PokeApp</div>
    <nav class="nav-links">
      <a href="/">Inicio</a>
      <div class="profile-container" th:if="${usuario != null}">
        <div class="profile-trigger">
          <img th:src="${usuario.avatarUrl}" alt="Icono" class="profile-icon" />
        </div>
        <div class="dropdown-content">
          <a href="/perfil">Mi Perfil</a>
          <a href="/historial">Estad. Entrenador</a>
          <form th:action="@{/logout}" method="post"><button type="submit">Cerrar Sesión</button></form>
        </div>
      </div>
    </nav>
  </header>

  <main class="container">
    <h1 style="text-align: left;">Estadísticas de Entrenador</h1>
    <section class="stats-grid">
      <div class="stat-card"><h3>Total Búsquedas</h3><p th:text="${totalBusquedas}">0</p></div>
      <div class="stat-card"><h3>Último Pokémon</h3><p th:text="${ultimaBusqueda ?: 'Ninguno'}">-</p></div>
      <div class="stat-card"><h3>Nivel Entrenador</h3><p th:text="${totalBusquedas / 5 + 1}">1</p></div>
    </section>
    
    <h2 style="text-align: left; margin-top: 40px;">Historial Reciente</h2>
    <table class="history-table">
      <thead><tr><th>Pokémon</th><th>ID</th><th>Fecha y Hora</th></tr></thead>
      <tbody>
        <tr th:each="b : ${historial}">
          <td><img th:src="${b.spriteUrl}" class="mini-sprite" alt="sprite"><span th:text="${b.pokemonName}">Pikachu</span></td>
          <td th:text="'#' + ${b.pokemonId}">#25</td>
          <td th:text="${#temporals.format(b.fechaBusqueda, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
