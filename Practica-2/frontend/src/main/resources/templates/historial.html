<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>PokeApp - Estadísticas</title>
  <link rel="stylesheet" th:href="@{/css/global.css}" />
  <link rel="stylesheet" th:href="@{/css/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/components.css}" />
  <link rel="stylesheet" th:href="@{/css/pokemon.css}" />
</head>
<body>
  <header class="navbar">
    <div class="logo">PokeApp</div>
    <nav class="nav-links">
      <a href="/">Inicio</a>
      <div class="profile-container" th:if="${usuario != null}">
        <div class="profile-trigger">
          <img th:src="${usuario.avatarUrl}" alt="Icono" class="profile-icon" />
        </div>
        <div class="dropdown-content">
          <a href="/perfil">Mi Perfil</a>
          <a href="/historial">Estad. Entrenador</a>
          <form th:action="@{/logout}" method="post"><button type="submit">Cerrar Sesión</button></form>
        </div>
      </div>
    </nav>
  </header>

  <main class="container">
    <h1 class="text-left">Estadísticas de Entrenador</h1>
    
    <section class="stats-grid" style="grid-template-columns: repeat(4, 1fr);">
      <div class="stat-card"><h3>Pokédex (Únicos)</h3><p th:text="${pokemonUnicos}">0</p></div>
      <div class="stat-card"><h3>Total Búsquedas</h3><p th:text="${totalBusquedas}">0</p></div>
      <div class="stat-card"><h3>Último Pokémon</h3><p th:text="${ultimaBusqueda ?: 'Ninguno'}">-</p></div>
      <div class="stat-card"><h3>Nivel Entrenador</h3><p th:text="${totalBusquedas / 5 + 1}">1</p></div>
    </section>
    
    <h2 class="text-left mt-40">Historial Reciente</h2>
    <table class="history-table">
      <thead><tr><th>Pokémon</th><th>ID</th><th>Fecha y Hora</th></tr></thead>
      <tbody>
        <tr th:each="b : ${historial}">
          <td><img th:src="${b.spriteUrl}" class="mini-sprite" alt="sprite"><span th:text="${b.pokemonName}">Pikachu</span></td>
          <td th:text="'#' + ${b.pokemonId}">#25</td>
          <td th:text="${#temporals.format(b.fechaBusqueda, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
