<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>PokeApp - Mi Perfil</title>
  <link rel="stylesheet" th:href="@{/css/global.css}" />
  <link rel="stylesheet" th:href="@{/css/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/components.css}" />
</head>
<body>
  <header class="navbar">
    <div class="logo">PokeApp</div>
    <nav class="nav-links">
      <a href="/">Inicio</a>
      <div class="profile-container" th:if="${usuario != null}">
        <div class="profile-trigger">
          <img th:src="${usuario.avatarUrl}" alt="Icono" class="profile-icon" />
        </div>
        <div class="dropdown-content">
          <a href="/perfil">Mi Perfil</a>
          <a href="/historial">Estad. Entrenador</a>
          <form th:action="@{/logout}" method="post"><button type="submit">Cerrar Sesión</button></form>
        </div>
      </div>
    </nav>
  </header>

  <main class="container profile-grid mt-20">
    
    <!-- Alertas -->
    <div th:if="${param.exito}" class="card alert alert-success col-span-2" th:text="${param.exito}"></div>
    <div th:if="${param.error}" class="card alert alert-error col-span-2" th:text="${param.error}"></div>

    <!-- Panel 1: Avatar -->
    <div class="card">
      <h2>Tu Avatar</h2>
      <p class="text-muted">Elige a tu compañero Pokémon:</p>
      
      <form th:action="@{/perfil/avatar}" method="post">
        <div class="avatar-selector">
          <div class="avatar-option">
            <input type="radio" id="ava-poke" name="avatarUrl" value="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" required>
            <label for="ava-poke"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="Pokéball"></label>
          </div>
          <div class="avatar-option">
            <input type="radio" id="ava-eevee" name="avatarUrl" value="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/133.png">
            <label for="ava-eevee"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/133.png" alt="Eevee"></label>
          </div>
          <div class="avatar-option">
            <input type="radio" id="ava-pika" name="avatarUrl" value="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png">
            <label for="ava-pika"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt="Pikachu"></label>
          </div>
          <div class="avatar-option">
            <input type="radio" id="ava-bulba" name="avatarUrl" value="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png">
            <label for="ava-bulba"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" alt="Bulbasaur"></label>
          </div>
          <div class="avatar-option">
            <input type="radio" id="ava-char" name="avatarUrl" value="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png">
            <label for="ava-char"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png" alt="Charmander"></label>
          </div>
          <div class="avatar-option">
            <input type="radio" id="ava-squirt" name="avatarUrl" value="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png">
            <label for="ava-squirt"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png" alt="Squirtle"></label>
          </div>
        </div>
        <button type="submit" class="btn-search w-100">Guardar Avatar</button>
      </form>
    </div>

    <!-- Panel 2: Contraseña -->
    <div class="card">
      <h2>Seguridad</h2>
      <form th:action="@{/perfil/password}" method="post">
        <div class="form-group">
          <label for="actual">Contraseña Actual:</label>
          <input type="password" id="actual" name="actual" class="w-100" required>
        </div>
        <div class="form-group">
          <label for="nueva">Nueva Contraseña:</label>
          <input type="password" id="nueva" name="nueva" class="w-100" required>
        </div>
        <div class="form-group">
          <label for="confirmacion">Confirmar Nueva Contraseña:</label>
          <input type="password" id="confirmacion" name="confirmacion" class="w-100" required>
        </div>
        <button type="submit" class="btn-search btn-dark w-100 mt-10">Actualizar Contraseña</button>
      </form>
    </div>
    
    <!-- Panel 3: Zona Peligrosa (Eliminar Cuenta) -->
    <div class="card col-span-2" style="border-color: #c0392b; background-color: #fadbd8; margin-top: 20px;">
      <h2 style="color: #c0392b;">ZONA PELIGROSA</h2>
      <p style="color: #c0392b;">Al eliminar tu cuenta, perderás todo tu progreso y tu Pokédex.</p>
      
      <!-- Usamos 'onsubmit' con confirm() para lanzar el popup nativo del navegador -->
      <form th:action="@{/perfil/eliminar}" method="post" onsubmit="return confirm('¡CUIDADO! ¿Estás seguro de que quieres eliminar tu cuenta y todo tu historial para siempre? Esta acción no se puede deshacer.');">
        <button type="submit" class="btn-search btn-red w-100 mt-10">ELIMINAR CUENTA DEFINITIVAMENTE</button>
      </form>
    </div>

  </main>
</body>
</html>
